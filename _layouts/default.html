<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <style>
        body { padding-top: 2rem; }
        nav { border-bottom: 1px solid var(--pico-muted-border-color); margin-bottom: 3rem; padding-bottom: 1rem; }
        footer { margin-top: 4rem; text-align: center; font-size: 0.85rem; color: var(--pico-muted-color); border-top: 1px solid var(--pico-muted-border-color); padding-top: 2rem; }
        .hero { margin-bottom: 3rem; }
    </style>
</head>
<body class="container">
    <nav>
        <ul>
            <li><strong><a href="{{ '/' | relative_url }}" class="secondary">{{ site.title }}</a></strong></li>
        </ul>
        <ul>
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/portfolio' | relative_url }}">Portfolio</a></li>
            <li><a href="{{ '/contact' | relative_url }}">Contact & Tips</a></li>
        </ul>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. Hosted on GitHub Pages.</p>
    </footer>
</body>
</html>
